apiVersion: templates.gatekeeper.sh/v1
kind: ConstraintTemplate
metadata:
  name: k8sblocklatesttag
spec:
  crd:
    spec:
      names:
        kind: K8sBlockLatestTag
  targets:
    - target: admission.k8s.gatekeeper.sh
      rego: |
        package k8sblocklatesttag

        violation[{"msg": msg}] {
          c := input.review.object.spec.containers[_]
          image := c.image
          not contains(image, ":")
          msg := sprintf("Container '%s' saknar explicit tagg (tolkas som latest): %s", [c.name, image])
        }

        violation[{"msg": msg}] {
          c := input.review.object.spec.containers[_]
          image := c.image
          endswith(image, ":latest")
          msg := sprintf("Container '%s' använder förbjuden :latest-tagg: %s", [c.name, image])
        }

        violation[{"msg": msg}] {
          c := input.review.object.spec.initContainers[_]
          image := c.image
          not contains(image, ":")
          msg := sprintf("InitContainer '%s' saknar explicit tagg (tolkas som latest): %s", [c.name, image])
        }

        violation[{"msg": msg}] {
          c := input.review.object.spec.initContainers[_]
          image := c.image
          endswith(image, ":latest")
          msg := sprintf("InitContainer '%s' använder förbjuden :latest-tagg: %s", [c.name, image])
        }
